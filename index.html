<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0d1117"/>
<title>صندوق الاشتراكات</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#0d1117;color:#e8f0ff;direction:rtl;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(84px + env(safe-area-inset-bottom, 12px));font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
input,select,button,textarea{font-family:inherit;font-size:15px}
input::placeholder{color:#374151}
button{cursor:pointer}
.page{display:none;padding:16px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(13,17,23,.98);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:200;padding:0 calc(6px + env(safe-area-inset-right, 0px)) calc(8px + env(safe-area-inset-bottom, 14px)) calc(6px + env(safe-area-inset-left, 0px))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:10px 4px 8px;color:#374151;transition:color .2s}
.nav-btn.active{color:#e8d5a3}
.nav-btn span:first-child{font-size:21px}
.nav-btn span:last-child{font-size:11px;font-weight:700}
.nav-dot{width:18px;height:2px;background:#e8d5a3;border-radius:1px;display:none}
.nav-btn.active .nav-dot{display:block}
/* HEADER */
#header{background:rgba(13,17,23,.97);padding:calc(14px + env(safe-area-inset-top, 22px)) calc(16px + env(safe-area-inset-right, 4px)) 14px calc(16px + env(safe-area-inset-left, 4px));position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-between;align-items:center}
#header h1{color:#e8d5a3;font-size:17px;font-weight:800}
#balance-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px}
/* CARDS GRID */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{border-radius:14px;padding:13px 14px;position:relative;overflow:hidden}
.card .card-label{color:#6b7a99;font-size:11px;margin-bottom:3px}
.card .card-val{font-size:15px;font-weight:800;line-height:1.2}
.card .card-sub{font-size:11px;margin-top:4px;opacity:.85}
/* BUTTONS */
.btn{border:none;border-radius:12px;padding:12px;font-weight:700;font-size:14px;width:100%;margin-bottom:8px}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-outline{background:transparent;color:#6b7a99;border:1px solid rgba(255,255,255,.15)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;width:auto;margin:0}
.btn-row{display:flex;gap:8px;margin-bottom:8px}
.btn-row .btn{margin-bottom:0}
/* FORMS */
.field{margin-bottom:12px}
.field label{display:block;color:#8899bb;font-size:12px;margin-bottom:5px}
.field label span{color:#f87171}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;color:#e8f0ff;outline:none}
.field textarea{resize:vertical;min-height:70px}
.field select{background-color:#1a2040}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:#161b2e;border-radius:22px 22px 0 0;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;padding:20px;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
#modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
#modal-title{color:#e8d5a3;font-weight:800;font-size:17px}
#modal-close{background:rgba(255,255,255,.1);border:none;color:#aaa;padding:5px 10px;border-radius:8px;font-size:16px}
/* ITEMS */
.item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:13px 15px;margin-bottom:9px}
.item.late{border-color:rgba(239,68,68,.3)}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.item-name{color:#e8f0ff;font-weight:700;font-size:14px}
.item-sub{color:#6b7a99;font-size:11px;margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block}
.badge-green{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.badge-red{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.badge-amber{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
/* TOAST */
#toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5);display:none;color:#fff}
/* MONTH GRID */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.month-btn{padding:9px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#a0b0cc;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center}
.month-btn.selected{border-color:#3b82f6;background:rgba(59,130,246,.2);color:#93c5fd}
.month-btn.paid{border-color:#22c55e;background:rgba(34,197,94,.15);color:#86efac;cursor:default}
/* SECTION */
.section{background:rgba(255,255,255,.04);border-radius:16px;padding:14px;margin-bottom:14px}
.section-title{color:#e8d5a3;font-weight:700;font-size:14px;margin-bottom:12px}
/* SEARCH */
#search-bar{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 14px;color:#e8f0ff;outline:none;margin-bottom:12px}
/* INFO BOX */
.info-box{border-radius:12px;padding:12px;margin-bottom:12px}
.info-amber{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}
.info-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.info-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.info-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}
.info-purple{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)}
/* BACK BTN */
.back-btn{background:rgba(255,255,255,.07);border:none;color:#93c5fd;padding:7px 14px;border-radius:10px;margin-bottom:14px;font-family:inherit;font-size:13px}
/* RECEIPT */
#receipt-pre{color:#86efac;font-size:11px;line-height:1.7;font-family:'Courier New',monospace;white-space:pre-wrap;background:rgba(0,0,0,.35);padding:14px;border-radius:10px;direction:ltr;text-align:left}
/* PROGRESS BAR */
.prog-wrap{background:rgba(255,255,255,.06);border-radius:4px;height:5px;overflow:hidden;margin-top:4px}
.prog-bar{background:linear-gradient(90deg,#3b82f6,#22c55e);height:100%;border-radius:4px;transition:width .3s}
/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;background:transparent;border:1px solid rgba(255,255,255,.09);border-radius:10px;color:#4b5563;padding:8px 4px;font-size:12px;font-weight:700;font-family:inherit}
.tab.active{background:rgba(255,255,255,.12);color:#e8e8f0}
/* STAT ROW */
.stat-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.stat-row span:first-child{color:#a0b0cc}
.stat-row span:last-child{font-weight:700}
/* CHILDREN LIST */
.child-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border-radius:8px;padding:7px 12px;margin-bottom:6px;font-size:13px;color:#c8d8f0}
/* OFFLINE BADGE */
.offline-badge{background:rgba(34,197,94,.12);color:#86efac;font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;border:1px solid rgba(34,197,94,.25)}
/* PRINT */
@media print{
  body *{visibility:hidden}
  #modal-box, #modal-box *{visibility:visible}
  #modal-overlay{position:absolute;inset:0;background:#fff!important;display:block!important;padding:0}
  #modal-box{box-shadow:none;border-radius:0;max-width:100%;width:100%}
  #modal-close,.btn{display:none!important}
  #modal-title{color:#000!important}
  #receipt-pre{color:#000!important;background:#fff!important}
}
</style>
</head>
<body>

<!-- PIN LOCK -->
<div id="pin-lock" style="display:none;position:fixed;inset:0;z-index:9000;background:#0d1117;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px">
  <div style="font-size:40px">🔒</div>
  <div style="color:#e8d5a3;font-weight:800;font-size:16px">أدخل رمز القفل</div>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')tryUnlock()" style="width:160px;text-align:center;font-size:22px;letter-spacing:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px;color:#e8f0ff;outline:none"/>
  <div id="pin-error" style="color:#fca5a5;font-size:12px;min-height:16px"></div>
  <button class="btn btn-blue" style="width:160px" onclick="tryUnlock()">دخول</button>
</div>

<!-- HEADER -->
<div id="header">
  <h1 id="org-name-hdr">صندوق الاشتراكات</h1>
  <div style="display:flex;align-items:center;gap:6px">
    <span class="offline-badge" id="conn-badge">⚪ بدون إنترنت</span>
    <button id="sync-btn" onclick="saveServerUrl();pushToServer()" style="background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25);border-radius:12px;padding:4px 8px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;display:none">🔄 مزامنة</button>
    <span id="balance-badge" class="badge-green">0.000 د.ل</span>
  </div>
</div>

<!-- PAGES -->
<div id="page-home" class="page active">
  <div style="margin-bottom:18px">
    <div style="color:#e8d5a3;font-size:20px;font-weight:800" id="home-org"></div>
    <div style="color:#4b5563;font-size:12px" id="home-date"></div>
  </div>
  <div class="cards" id="home-cards"></div>
  <div id="late-alert"></div>
  <div class="btn-row">
    <button class="btn btn-blue" onclick="openModal('addFamily')">👨‍👩‍👧 أسرة جديدة</button>
    <button class="btn btn-red" onclick="openModal('expense')">💸 مصروف</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-purple" onclick="openModal('deposit')">💰 إيداع</button>
    <button class="btn btn-outline" onclick="navTo('families')">📋 قائمة الأسر</button>
  </div>
</div>

<div id="page-families" class="page">
  <div id="fam-list-view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="color:#e8d5a3;font-weight:800;font-size:18px" id="fam-count">الأسر</div>
      <button class="btn btn-blue btn-sm" onclick="openModal('addFamily')">+ إضافة</button>
    </div>
    <input id="search-bar" placeholder="🔍 بحث بالاسم أو الهاتف..." oninput="renderFamilies()"/>
    <div id="fam-list"></div>
  </div>
  <div id="fam-detail-view" style="display:none"></div>
  <div id="fam-edit-view" style="display:none"></div>
</div>

<div id="page-finance" class="page">
  <div style="color:#e8d5a3;font-weight:800;font-size:18px;margin-bottom:14px">💰 الحسابات المالية</div>
  <div id="finance-summary-card"></div>
  <div class="tabs">
    <button class="tab active" id="tab-exp" onclick="switchTab('exp')">💸 المصروفات</button>
    <button class="tab" id="tab-dep" onclick="switchTab('dep')">💰 الإيداعات</button>
    <button class="tab" id="tab-sum" onclick="switchTab('sum')">📊 الملخص</button>
  </div>
  <div id="finance-content"></div>
</div>

<div id="page-reports" class="page">
  <div style="color:#e8d5a3;font-weight:800;font-size:18px;margin-bottom:14px">📈 التقارير</div>
  <div id="reports-content"></div>
</div>

<div id="page-settings" class="page">
  <div style="color:#e8d5a3;font-weight:800;font-size:18px;margin-bottom:14px">⚙️ الإعدادات</div>
  <div id="settings-content"></div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nav-btn active" id="nav-home" onclick="navTo('home')"><span>🏠</span><span>الرئيسية</span><div class="nav-dot"></div></button>
  <button class="nav-btn" id="nav-families" onclick="navTo('families')"><span>👥</span><span>الأسر</span><div class="nav-dot"></div></button>
  <button class="nav-btn" id="nav-finance" onclick="navTo('finance')"><span>💰</span><span>المالية</span><div class="nav-dot"></div></button>
  <button class="nav-btn" id="nav-reports" onclick="navTo('reports')"><span>📈</span><span>التقارير</span><div class="nav-dot"></div></button>
  <button class="nav-btn" id="nav-settings" onclick="navTo('settings')"><span>⚙️</span><span>الإعدادات</span><div class="nav-dot"></div></button>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-header">
      <span id="modal-title"></span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================================================
// DATA
// ============================================================
const STORE = "sub_v4";
const FEE = 10;
const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const CONFIG = { MSFT_CLIENT_ID: "aa51db18-0982-4afb-8b4b-7415afee18d7" };
const APP_VERSION = "1.3.0";
const PIN_KEY = "sub_pin";
const MSFT_TOKENS_KEY = "msft_tokens";
const MSFT_SCOPE = "Files.ReadWrite.AppFolder offline_access";
const ONEDRIVE_META_KEY = "onedrive_meta";

function blankDb(){
  return {
    families:[],
    expenses:[],
    deposits:[],
    carryOver:0,
    settings:{orgName:"صندوق الاشتراكات",startDate:nowKey(),adminPhone:"",adminEmail:""}
  };
}

let db = load();

function load(){
  try{ const d=localStorage.getItem(STORE); return d?JSON.parse(d):blankDb(); }catch{ return blankDb(); }
}
function save(){ localStorage.setItem(STORE, JSON.stringify(db)); scheduleAutoBackup(); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function nowKey(){ const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); }
function fmtMoney(n){ return Number(n||0).toFixed(3)+" د.ل"; }
function fmtDate(d){ return d?new Date(d).toLocaleDateString("ar"):"—"; }
function monthLabel(key){ const [y,m]=key.split("-"); return MONTHS[parseInt(m)-1]+" "+y; }
function monthsSince(start){
  if(!start)return[];
  const s=new Date(start+"-01"), e=new Date(); e.setDate(1);
  const keys=[]; const c=new Date(s);
  while(c<=e){ keys.push(c.getFullYear()+"-"+String(c.getMonth()+1).padStart(2,"0")); c.setMonth(c.getMonth()+1); }
  return keys;
}
function famFee(f){ return FEE*(1+(f.children||[]).length); }
function famDueMonths(f){ return monthsSince(f.startDate||f.createdAt?.slice(0,7)); }
function famPaidMonths(f){ return Object.keys(f.payments||{}); }

function famActiveCount(f, monthKey){
  let c = monthKey>=(f.startDate||"0000-00")?1:0;
  for(const ch of (f.children||[])){ if(monthKey>=(ch.startDate||f.startDate||"0000-00")) c++; }
  return c;
}
function famFeeForMonth(f, monthKey){ return FEE*famActiveCount(f, monthKey); }

function famUnpaid(f){
  const all = famDueMonths(f);
  const paid = famPaidMonths(f);
  return all.filter(k=>!paid.includes(k));
}
function famTotalDue(f){
  return famDueMonths(f).reduce((s,m)=>s+famFeeForMonth(f,m),0);
}
function famTotalPaid(f){ return Object.values(f.payments||{}).reduce((s,p)=>s+Number(p.amount||0),0); }
function famBalance(f){ return famTotalPaid(f)+Number(f.carryOver||0)+Number(f.credit||0)-famTotalDue(f); }

function monthsUntilYearEnd(){
  const n=new Date();
  const keys=[];
  for(let m=n.getMonth()+1; m<=12; m++) keys.push(n.getFullYear()+"-"+String(m).padStart(2,"0"));
  return keys;
}

// ============================================================
// DERIVED TOTALS
// ============================================================
function totals(){
  const allPaid = db.families.reduce((s,f)=>s+famTotalPaid(f),0);
  const allCarry = db.families.reduce((s,f)=>s+Number(f.carryOver||0),0);
  const allCredit = db.families.reduce((s,f)=>s+Number(f.credit||0),0);
  const allDue   = db.families.reduce((s,f)=>s+famTotalDue(f),0);
  const expenses = db.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const deposits = db.deposits.reduce((s,d)=>s+Number(d.amount||0),0);
  const balance  = Number(db.carryOver||0)+allCarry+allCredit+allPaid+deposits-expenses;
  const members  = db.families.reduce((s,f)=>s+1+(f.children||[]).length,0);
  return {allPaid,allCarry,allDue,expenses,deposits,balance,members};
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPage = "home";
function navTo(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  document.getElementById("nav-"+page).classList.add("active");
  currentPage = page;
  // reset family sub-views
  if(page==="families"){ showFamList(); }
  renderPage(page);
}

function renderPage(page){
  if(page==="home")renderHome();
  else if(page==="families")renderFamilies();
  else if(page==="finance")renderFinance();
  else if(page==="reports")renderReports();
  else if(page==="settings")renderSettings();
}

// ============================================================
// HOME
// ============================================================
function renderHome(){
  const t = totals();
  document.getElementById("home-org").textContent = db.settings.orgName;
  document.getElementById("home-date").textContent = new Date().toLocaleDateString("ar",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  document.getElementById("org-name-hdr").textContent = db.settings.orgName;

  const bal = t.balance;
  const bb = document.getElementById("balance-badge");
  bb.textContent = fmtMoney(bal);
  bb.className = "badge "+(bal>=0?"badge-green":"badge-red");

  document.getElementById("home-cards").innerHTML = `
    ${card("الأسر المسجلة","👥","#3b82f6",db.families.length,"")}
    ${card("إجمالي الأفراد","👤","#8b5cf6",t.members,"")}
    ${card("المحصّل","✅","#22c55e",fmtMoney(t.allPaid),"من "+fmtMoney(t.allDue))}
    ${card("الرصيد المتاح","💰","#"+(bal>=0?"22c55e":"ef4444"),fmtMoney(bal),bal>=0?"✓ كافٍ":"⚠️ عجز")}
    ${card("المصروفات","💸","#ef4444",fmtMoney(t.expenses),"")}
    ${card("الرصيد المرحّل","🔄","#f59e0b",fmtMoney(Number(db.carryOver||0)+t.allCarry),"")}
  `;

  const late = db.families.filter(f=>famUnpaid(f).length>0);
  const la = document.getElementById("late-alert");
  if(late.length>0){
    la.innerHTML = `<div class="info-box info-red" style="margin-bottom:14px">
      <div style="color:#fca5a5;font-weight:700;margin-bottom:8px">⚠️ ${late.length} أسرة لديها شهور متأخرة</div>
      ${late.slice(0,5).map(f=>{
        const u=famUnpaid(f); const dueAmt=u.reduce((s,m)=>s+famFeeForMonth(f,m),0);

function promoteChild(famId, childId){
  if(!confirm("هل تريد نقل هذا الابن إلى أسرة مستقلة جديدة؟")) return;
  const f = db.families.find(x=>x.id===famId); if(!f) return;
  const ci = f.children.findIndex(c=>c.id===childId); if(ci===-1) return;
  const child = f.children[ci];
  const cs = child.startDate||f.startDate||nowKey();
  const newFam = {
    id: genId(),
    name: child.name,
    phone: f.phone,
    phone2: "",
    email: "",
    whatsapp: "", messenger: "", telegram: "",
    bankName: "", accountNo: "", address: "", notes: "منقول من أسرة: "+f.name,
    startDate: cs,
    carryOver: 0, credit: 0,
    children: [],
    payments: {},
    createdAt: new Date().toISOString()
  };
  const childPaidMonths = Object.keys(f.payments||{}).filter(m=>famActiveCount(f,m)>1);
  for(const m of childPaidMonths){
    newFam.payments[m] = {date: f.payments[m].date, amount: FEE};
  }
  f.children.splice(ci,1);
  db.families.push(newFam);
  save();
  showFamDetail(famId);
  showToast("تم نقل "+child.name+" إلى أسرة جديدة ✓");
}

let payFamId = null;
let paySelected = [];

function openPayModal(famId){
  payFamId = famId; paySelected = [];
  const f = db.families.find(x=>x.id===famId);
  if(!f) return;
  openModal("payment", f);
}

function toggleMonth(key){
  if(paySelected.includes(key)) paySelected=paySelected.filter(x=>x!==key);
  else paySelected.push(key);
  renderPayMonths();
  updatePaySummary();
}

function selectAllUnpaid(){
  const f = db.families.find(x=>x.id===payFamId); if(!f) return;
  const unpaid = famUnpaid(f);
  const dueMonths = famDueMonths(f);
  const paidMonths = Object.keys(f.payments||{});
  const nextMonths = monthsUntilYearEnd().filter(m=>!dueMonths.includes(m) && !paidMonths.includes(m));
  const allAvail = [...unpaid, ...nextMonths];
  paySelected = paySelected.length===allAvail.length?[]:JSON.parse(JSON.stringify(allAvail));
  renderPayMonths();
  updatePaySummary();
}

function autoSelectMonths(){
  const f = db.families.find(x=>x.id===payFamId); if(!f) return;
  const amt = parseFloat(document.getElementById("pay-amount").value)||0;
  if(amt<=0) return;
  const dueMonths = famDueMonths(f);
  const paidMonths = Object.keys(f.payments||{});
  const nextMonths = monthsUntilYearEnd().filter(m=>!dueMonths.includes(m) && !paidMonths.includes(m));
  const allAvail = [...famUnpaid(f), ...nextMonths];
  let remaining = amt;
  paySelected = [];
  for(const m of allAvail){
    const fee = famFeeForMonth(f, m);
    if(remaining >= fee){
      paySelected.push(m);
      remaining -= fee;
    } else break;
  }
  renderPayMonths();
  updatePaySummary();
}

function updatePaySummary(){
  const f = db.families.find(x=>x.id===payFamId); if(!f) return;
  const total = paySelected.reduce((s,m)=>s+famFeeForMonth(f,m),0);
  const paid = parseFloat(document.getElementById("pay-amount")?.value||0);
  const credit = Number(f.credit||0);
  document.getElementById("pay-total").textContent = paySelected.length>0?"الإجمالي: "+fmtMoney(total):"";
  const rem = document.getElementById("pay-remainder");
  if(total > 0 && paySelected.length>0){
    const afterCredit = Math.max(0, total - credit);
    if(paid >= afterCredit){
      const over = paid - afterCredit;
      rem.textContent = over>0?"💰 المتبقي كرصيد معلق: "+fmtMoney(over):"✓ مسدد بالكامل (بما في ذلك "+fmtMoney(Math.min(credit,total))+" من الرصيد المعلق)";
      rem.style.color = "#86efac";
    } else {
      const need = afterCredit - paid;
      rem.textContent = "⚠️ المبلغ المطلوب: "+fmtMoney(need)+" (الرصيد المعلق: "+fmtMoney(credit)+")";
      rem.style.color = "#fca5a5";
    }
    rem.style.display="block";
  } else { rem.style.display="none"; }
}

function renderPayMonths(){
  const f = db.families.find(x=>x.id===payFamId); if(!f) return;
  const unpaid = famUnpaid(f);
  const dueMonths = famDueMonths(f);
  const paidMonths = Object.keys(f.payments||{});
  const nextMonths = monthsUntilYearEnd().filter(m=>!dueMonths.includes(m) && !paidMonths.includes(m));
  const allAvail = [...unpaid, ...nextMonths];
  const el = document.getElementById("pay-months");
  if(!el) return;
  el.innerHTML = allAvail.map(k=>{
    const isFuture = nextMonths.includes(k);
    const fee = famFeeForMonth(f, k);
    return `<button class="month-btn ${paySelected.includes(k)?"selected":""} ${!isFuture? "":"badge-blue"}" onclick="toggleMonth('${k}')">${monthLabel(k)}<br><small>${fmtMoney(fee)}</small></button>`;
  }).join("");
}

function confirmPay(){
  if(!paySelected.length){ showToast("اختر شهراً واحداً على الأقل",true); return; }
  const f = db.families.find(x=>x.id===payFamId); if(!f) return;
  const total = paySelected.reduce((s,m)=>s+famFeeForMonth(f,m),0);
  const credit = Number(f.credit||0);
  const paidAmount = parseFloat(document.getElementById("pay-amount")?.value||0);
  const effectivePaid = paidAmount + Math.min(credit, Math.max(0, total - paidAmount));
  if(effectivePaid < total && paidAmount <= 0){ showToast("أدخل المبلغ المدفوع أو استخدم الرصيد المعلق",true); return; }
  if(!f.payments) f.payments={};
  paySelected.forEach(m=>{ f.payments[m]={date:new Date().toISOString(),amount:famFeeForMonth(f,m)}; });
  const usedCredit = Math.max(0, total - paidAmount);
  const newCredit = Math.max(0, credit - usedCredit);
  const overPayment = Math.max(0, paidAmount - total);
  f.credit = newCredit + overPayment;
  db.families = db.families.map(x=>x.id===f.id?f:x);
  save();
  // receipt
  const lines = [
    "════════════════════════════",
    "   "+db.settings.orgName,
    "════════════════════════════",
    "رقم الإيصال : "+genId().toUpperCase(),
    "التاريخ     : "+new Date().toLocaleDateString("ar"),
    "────────────────────────────",
    "المشترك     : "+f.name,
    "الهاتف      : "+(f.phone||"—"),
    "عدد الأفراد : "+(1+(f.children||[]).length),
    "────────────────────────────",
    "الشهور المدفوعة:",
    ...paySelected.sort().map(m=>"  • "+monthLabel(m)+" ("+fmtMoney(famFeeForMonth(f,m))+")"),
    "────────────────────────────",
    "المبلغ النقدي : "+fmtMoney(paidAmount),
    usedCredit>0?("من الرصيد المعلق : "+fmtMoney(usedCredit)):"",
    "────────────────────────────",
    "المبلغ الإجمالي : "+fmtMoney(total),
    overPayment>0?("الرصيد المعلق الجديد : "+fmtMoney(newCredit+overPayment)):"",
    "────────────────────────────",
    "شكراً على السداد ✓",
    "════════════════════════════",
  ].filter(Boolean);
  openModal("receipt", lines.join("\n"));
  showToast("تم تسجيل الدفع بنجاح ✓");
}

// ============================================================
let swRegistration = null;
function initSwUpdate(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(reg=>{
    swRegistration = reg;
    reg.addEventListener('updatefound', ()=>{
      const newSW = reg.installing;
      if(!newSW) return;
      newSW.addEventListener('statechange', ()=>{
        if(newSW.state==='installed' && navigator.serviceWorker.controller){
          showUpdateBanner();
        }
      });
    });
    setInterval(()=>{ reg.update(); }, 3600000);
  }).catch(()=>{});
}
function showUpdateBanner(){
  const existing = document.getElementById('update-banner');
  if(existing) return;
  const banner = document.createElement('div');
  banner.id = 'update-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9998;background:#161b2e;border:1px solid rgba(59,130,246,.4);border-radius:16px;padding:14px 18px;max-width:400px;width:calc(100% - 32px);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeIn .3s ease;text-align:center';
  banner.innerHTML = `
    <div style="color:#93c5fd;font-weight:800;font-size:14px;margin-bottom:8px">🆕 نسخة جديدة متاحة!</div>
    <div style="color:#6b7a99;font-size:12px;margin-bottom:12px">تم تحديث التطبيق إلى الإصدار ${APP_VERSION}</div>
    <button class="btn btn-blue" style="width:auto;padding:8px 24px;display:inline-block" onclick="applyUpdate()">🔄 تحديث الآن</button>
    <button class="btn btn-outline btn-sm" style="width:auto;display:inline-block;margin-right:6px" onclick="dismissUpdateBanner()">لاحقاً</button>
  `;
  document.body.appendChild(banner);
}
function dismissUpdateBanner(){
  const el = document.getElementById('update-banner');
  if(el) el.remove();
}
function applyUpdate(){
  if(swRegistration && swRegistration.waiting){
    swRegistration.waiting.postMessage({action:'skipWaiting'});
  }
  dismissUpdateBanner();
  window.location.reload();
}

// ============================================================
function getMsftTokens(){
  try{ const d=localStorage.getItem(MSFT_TOKENS_KEY); return d?JSON.parse(d):null; }catch{ return null; }
}
function setMsftTokens(t){ localStorage.setItem(MSFT_TOKENS_KEY, JSON.stringify(t)); }
function msftLogout(){
  localStorage.removeItem(MSFT_TOKENS_KEY);
  showToast("تم قطع الاتصال بـ OneDrive");
  renderSettings();

async function msftLogin(){
  if(!CONFIG.MSFT_CLIENT_ID || CONFIG.MSFT_CLIENT_ID.startsWith("PASTE_")){
    showToast("لم يتم إعداد ربط Microsoft بعد (راجع AZURE_SETUP.md)", true); return;
  }
  try{
    const res = await fetch("https://login.microsoftonline.com/common/oauth2/v2.0/devicecode", {
      method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams({client_id:CONFIG.MSFT_CLIENT_ID, scope:MSFT_SCOPE})
    });
    const data = await res.json();
    if(!data.device_code){ showToast("تعذّر بدء تسجيل الدخول", true); return; }
    openModal("onedriveConnect", data);
    pollMsftToken(data.device_code, data.interval||5);
  }catch(e){ showToast("لا يوجد اتصال بالإنترنت", true); }
}

let msftPollTimer = null;
function pollMsftToken(deviceCode, interval){
  if(msftPollTimer) clearInterval(msftPollTimer);
  msftPollTimer = setInterval(async ()=>{
    try{
      const res = await fetch("https://login.microsoftonline.com/common/oauth2/v2.0/token", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:new URLSearchParams({
          grant_type:"urn:ietf:params:oauth:grant-type:device_code",
          client_id:CONFIG.MSFT_CLIENT_ID,
          device_code:deviceCode
        })
      });
      const data = await res.json();
      if(data.access_token){
        clearInterval(msftPollTimer); msftPollTimer=null;
        setMsftTokens({access_token:data.access_token, refresh_token:data.refresh_token, expires_at:Date.now()+(data.expires_in*1000)});
        closeModal(); showToast("تم ربط حساب Microsoft ✓"); renderSettings();
        backupToOneDrive(true);
      } else if(data.error && data.error!=="authorization_pending"){
        clearInterval(msftPollTimer); msftPollTimer=null;
        closeModal(); showToast("انتهت صلاحية رمز الدخول، حاول مجدداً", true);
      }
    }catch(e){ /* transient network error while polling, keep trying */ }
  }, interval*1000);
}

async function getValidMsftToken(){
  const t = getMsftTokens();
  if(!t) return null;
  if(Date.now() < t.expires_at - 60000) return t.access_token;
  try{
    const res = await fetch("https://login.microsoftonline.com/common/oauth2/v2.0/token", {
      method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams({
        grant_type:"refresh_token",
        client_id:CONFIG.MSFT_CLIENT_ID,
        refresh_token:t.refresh_token,
        scope:MSFT_SCOPE
      })
    });
    const data = await res.json();
    if(!data.access_token){ msftLogout(); return null; }
    setMsftTokens({access_token:data.access_token, refresh_token:data.refresh_token||t.refresh_token, expires_at:Date.now()+(data.expires_in*1000)});
    return data.access_token;
  }catch(e){ return null; }
}

let autoBackupTimer = null;
function scheduleAutoBackup(){
  if(!navigator.onLine || !getMsftTokens()) return;
  if(autoBackupTimer) clearTimeout(autoBackupTimer);
  autoBackupTimer = setTimeout(()=>backupToOneDrive(true), 5000);
}

async function backupToOneDrive(silent){
  if(!navigator.onLine){ if(!silent) showToast("لا يوجد اتصال بالإنترنت", true); return; }
  const token = await getValidMsftToken();
  if(!token){ if(!silent) showToast("اربط حساب Microsoft أولاً", true); return; }
  try{
    const res = await fetch("https://graph.microsoft.com/v1.0/me/drive/special/approot:/backup.json:/content", {
      method:"PUT",
      headers:{"Authorization":"Bearer "+token, "Content-Type":"application/json"},
      body:JSON.stringify(db)
    });
    if(!res.ok) throw new Error("upload failed");
    setOnedriveMeta({lastBackupAt:new Date().toISOString()});
    if(!silent) showToast("تم النسخ الاحتياطي إلى OneDrive ✓");
    if(currentPage==="settings") renderSettings();
  }catch(e){ if(!silent) showToast("فشل النسخ الاحتياطي", true); }
}

async function restoreFromOneDrive(){
  if(!confirm("سيتم استبدال كل البيانات الحالية على الجهاز بالنسخة المخزّنة في OneDrive. متابعة؟")) return;
  if(!navigator.onLine){ showToast("لا يوجد اتصال بالإنترنت", true); return; }
  const token = await getValidMsftToken();
  if(!token){ showToast("اربط حساب Microsoft أولاً", true); return; }
  try{
    const res = await fetch("https://graph.microsoft.com/v1.0/me/drive/special/approot:/backup.json:/content", {
      headers:{"Authorization":"Bearer "+token}
    });
    if(!res.ok) throw new Error("not found");
    db = await res.json();
    save();
    renderPage(currentPage);
    showToast("تم استعادة البيانات من OneDrive ✓");
  }catch(e){ showToast("لا توجد نسخة محفوظة في OneDrive بعد", true); }
}

const SERVER_KEY = "sub_server_url";

function getServerUrl(){ return localStorage.getItem(SERVER_KEY)||""; }
function setServerUrl(u){ localStorage.setItem(SERVER_KEY, u); }

async function checkServer(){
  const url = getServerUrl();
  const el = document.getElementById("sv-status");
  const syncBtn = document.getElementById("sync-btn");
  if(!url||!navigator.onLine){
    if(el) el.textContent="⚪ غير متصل";
    if(syncBtn) syncBtn.style.display="none";
    return false;
  }
  try{
    const res = await fetch(url+"/api/health", {signal:AbortSignal.timeout(3000)});
    const ok = res.ok;
    if(el){ el.textContent=ok?"🟢 متصل بالخادم":"🔴 خطأ في الاتصال"; el.style.color=ok?"#86efac":"#fca5a5"; }
    if(syncBtn) syncBtn.style.display=ok?"inline-block":"none";
    return ok;
  }catch{
    if(el){ el.textContent="⚪ الخادم غير متاح"; el.style.color="#6b7a99"; }
    if(syncBtn) syncBtn.style.display="none";
    return false;
  }
}

async function pushToServer(){
  const url = getServerUrl();
  if(!url){ showToast("أدخل عنوان الخادم أولاً", true); return; }
  if(!navigator.onLine){ showToast("لا يوجد اتصال بالإنترنت", true); return; }
  try{
    const res = await fetch(url+"/api/data", {
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(db)
    });
    if(res.ok){ showToast("✓ تم رفع البيانات إلى الخادم"); checkServer(); }
    else showToast("فشل رفع البيانات", true);
  }catch{ showToast("لا يمكن الاتصال بالخادم", true); }
}

async function pullFromServer(){
  const url = getServerUrl();
  if(!url){ showToast("أدخل عنوان الخادم أولاً", true); return; }
  if(!navigator.onLine){ showToast("لا يوجد اتصال بالإنترنت", true); return; }
  if(!confirm("سيتم استبدال جميع البيانات المحلية ببيانات الخادم. متابعة؟")) return;
  try{
    const res = await fetch(url+"/api/data");
    if(!res.ok) throw new Error();
    const data = await res.json();
    if(data){ db=data; save(); renderPage(currentPage); showToast("✓ تم سحب البيانات من الخادم"); checkServer(); }
    else showToast("لا توجد بيانات على الخادم بعد", true);
  }catch{ showToast("لا يمكن الاتصال بالخادم", true); }
}

function serverSyncSectionHtml(){
  const url = getServerUrl();
  return `
    <div style="color:#6b7a99;font-size:12px;margin-bottom:12px">اربط التطبيق بخادم ويندوز المحلي للمزامنة اللحظية والنسخ الاحتياطي</div>
    <div class="field"><label>عنوان الخادم (مثال: http://192.168.1.100:3456)</label>

  const el = document.getElementById("sv-url");
